name: Docs

# On every push to the active branches, build + EXECUTE the docs site (running the
# tutorial notebooks doubles as a test layer) but skip the slow WASM bake and do NOT
# deploy. Only on a release — i.e. when a `v*` tag is pushed (same trigger as
# release.yml, so docs go live alongside the PyPI publish) — build the full site
# including the interactive WASM pages and deploy to GitHub Pages. A manual run can
# force the full build + deploy via the `deploy` input.
on:
  push:
    branches:
      - uv-cleanup
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy the built docs to GitHub Pages"
        type: boolean
        default: false

# Manual prerequisite: Settings -> Pages -> Build and deployment -> Source = GitHub Actions.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.7.6"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"

      # mystmd is an npm package (not a Python dep); poe docs-build-pages shells
      # out to `myst`, so it must be on PATH. Pinned to match local dev (v1.10.1).
      - name: Install MyST
        run: npm install -g mystmd@1.10.1

      - name: Install dependencies
        run: uv sync --extra all

      - name: Build wheel
        run: uv build --wheel

      # Non-release build (the common case): regenerate sources, then build + EXECUTE
      # the MyST site through a real Jupyter kernel. Running every tutorial end-to-end
      # doubles as a test layer. Skips the slow docs-wasm bake (headless Pyodide +
      # micropip per notebook) — those interactive pages are only needed for the
      # deployed site, so they run release-only below.
      - name: Build + execute docs (test layer; no WASM)
        if: ${{ !(startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.deploy)) }}
        run: |
          uv run poe docs-generate
          uv run poe docs-site

      # Release / manual deploy: full build INCLUDING the interactive WASM pages,
      # under the /nltools GitHub Pages subpath.
      - name: Build docs for GitHub Pages (full, incl WASM)
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
        env:
          BASE_URL: /nltools
        run: uv run poe docs-build

      # Pages configuration + artifact upload are deploy-only: on a plain push the
      # build above still runs (it doubles as a notebook-execution test layer), but
      # these steps would 404 off-release (Pages need not be enabled to build). Gate
      # them on the same condition as the deploy job below.
      - name: Configure GitHub Pages
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: docs/_build/html

  deploy:
    needs: build
    # Deploy only on a release tag push, or a manual run that opts in. Plain
    # pushes to uv-cleanup/main build above but stop here (no deploy).
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
