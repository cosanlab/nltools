name: CI

on:
  push:
    branches:
      - master
      - main
      - uv-cleanup
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.6"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra all

      - name: Lint with ruff
        run: uv run ruff check nltools/

      - name: Run tests
        run: uv run pytest -n 2 --tb=short

      - name: Build docs
        if: matrix.python-version == '3.12'
        run: uv run jupyter-book build docs

      - name: Build package
        if: matrix.python-version == '3.12'
        run: uv build

  pyodide:
    name: Pyodide smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.6"

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nltools/tests/pyodide/package.json

      - name: Build wheel
        run: uv build --wheel

      - name: Install pyodide npm package
        working-directory: nltools/tests/pyodide
        run: npm install --silent

      - name: Cache Pyodide runtime wheels
        uses: actions/cache@v4
        with:
          path: nltools/tests/pyodide/node_modules/pyodide
          key: pyodide-${{ runner.os }}-${{ hashFiles('nltools/tests/pyodide/package.json') }}

      - name: Run Pyodide smoke tests
        working-directory: nltools/tests/pyodide
        run: node test_runner.mjs
