[project]
name = "nltools"
dynamic = ["version"]
requires-python = ">=3.11"
description = "A Python package to analyze neuroimaging data"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name="Luke J. Chang", email="luke.j.chang@dartmouth.edu"},
    {name="Eshin Jolly", email="eshin.jolly@gmail.com"},
]
classifiers = [
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
]
keywords=["neuroimaging", "preprocessing", "analysis", "machine-learning"]
dependencies = [
    "h5py>=3.15",
    "nilearn>=0.12",
    "polars>=1.35",
    "pynv>=0.3",
    "seaborn>=0.13.2",
]

# Installed by default when using uv install
[dependency-groups]
dev = [
    "ipywidgets>=8.1.7",
    "jupyter-book>=1.0.4.post1",
    "jupytext>=1.18.1",
    "networkx>=3.5",
    "pytest>=8.4",
    "pytest-xdist>=3.8.0",
    "rich>=14.2.0",
    "ruff==0.14.2",
    "torch>=2.9.0",
    "tqdm>=4.67.1",
]

[project.urls]
Homepage = "https://nltools.org"

[build-system]
requires = ["setuptools>=61.0.0", "setuptools-scm", "hatchling"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
exclude = ["nltools/tests"]

[tool.setuptools]
package-data = {"nltools" = ["resources/*"]}

[tool.setuptools.dynamic]
version = {attr = "nltools.version.__version__"}

[tool.ruff.lint]
ignore = ["W292","E501", "E731", "E741"]

[tool.pytest.ini_options]
markers = [
    "tier1: Fast core tests (<3s, run on every iteration)",
    "tier2: Comprehensive tests (>3s, run before commits)",
]
# Default: run tier1 only for fast feedback during development and CI
# This ensures GitHub Actions runs only fast tests by default
addopts = "-m tier1"
