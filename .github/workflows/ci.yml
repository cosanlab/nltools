name: CI

on:
  push:
    branches:
      - master
      - main
      - uv-cleanup
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # Check if we should skip this run (beads sync commits)
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Check commit message
        id: check
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -qE "^bd (sync|daemon sync):"; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
            echo "Skipping CI for beads sync commit"
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.6"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check nltools/

      - name: Run tests
        run: uv run pytest -n 2 --tb=short

      - name: Build docs
        if: matrix.python-version == '3.12'
        run: uv run jupyter-book build docs

      - name: Build package
        if: matrix.python-version == '3.12'
        run: uv build
