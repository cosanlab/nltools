name: CI

# Fast feedback on every push to / PR against main (uv-cleanup is the active
# v0.6.0 dev branch and kept here so in-flight work still gets CI). Runs the
# default fast test suite (slow + integration markers are skipped by pyproject
# addopts). Manually triggerable via the Actions tab.
#
# Skip CI for a push by putting `ci skip` anywhere in the head commit message
# (each job is guarded below). PRs always run — the guard only reads the push
# head commit, which is absent on pull_request events.
on:
  push:
    branches:
      - main
      - master
      - uv-cleanup
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint:
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.7.6"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra all

      # Non-mutating mirror of `poe lint` (which runs ruff --fix + format
      # in-place). CI must fail on drift, not silently fix it.
      - name: Ruff lint
        run: uv run ruff check nltools/

      - name: Ruff format check
        run: uv run ruff format --check nltools/

      - name: Type-check with ty
        run: uv run ty check nltools/

      # v0.6.0 canonical-kwarg API conventions gate (semgrep rules + kw-only check).
      - name: API conventions
        run: uv run poe lint-api

  test:
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.7.6"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra all

      - name: Cache HF niftis dataset
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/huggingface
          key: hf-cache-${{ runner.os }}-${{ hashFiles('nltools/templates/fetch.py') }}
          restore-keys: |
            hf-cache-${{ runner.os }}-

      - name: Run fast tests
        env:
          HF_HUB_ETAG_TIMEOUT: "30"
        run: uv run poe test

      - name: Build docs (API generation + MyST site smoke; skips the slow marimo/WASM export)
        if: matrix.python-version == '3.12'
        run: |
          uv run poe docs-generate
          cd docs && uv run myst build --html

      - name: Build package
        if: matrix.python-version == '3.12'
        run: uv build

  pyodide:
    name: Pyodide smoke tests
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.7.6"

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: nltools/tests/pyodide/package.json

      - name: Build wheel
        run: uv build --wheel

      - name: Install pyodide npm package
        working-directory: nltools/tests/pyodide
        run: npm install --silent

      - name: Cache Pyodide runtime wheels
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: nltools/tests/pyodide/node_modules/pyodide
          key: pyodide-${{ runner.os }}-${{ hashFiles('nltools/tests/pyodide/package.json') }}

      - name: Run Pyodide smoke tests
        working-directory: nltools/tests/pyodide
        run: node test_runner.mjs
