# nltools structural lint — enforces the v0.6.0 canonical-kwarg API conventions
# from CLAUDE.md programmatically. Mirrors the bossanova .semgrep/ setup.
#
# Scope model: the conventions bind the PUBLIC API surface — the four data-class
# facades (BrainData, Adjacency, DesignMatrix, BrainCollection) plus public
# stats/mask/datasets functions. The functional-core / algorithm-layer internals
# (algorithms/, pipelines/, and underscore-prefixed helpers) may keep legacy
# names because the facades translate at the boundary (CLAUDE.md "Facade
# translation" rule). Rules therefore (a) match only public defs via the
# `^[^_]` name filter and (b) exclude the algorithm/pipeline internals by path.
#
# Suppress a genuine false positive with a trailing `# nosemgrep: <rule-id>` and
# a one-line reason.
#
# NOTE (known gap): the "keyword-only `*` marker required in __init__ and any
# public method with 3+ kwargs" convention is a structural-absence check that
# semgrep patterns cannot express cleanly; it is enforced separately (see
# scripts/check_kwonly.py, wired into the same `lint-api` task).

rules:
  # ── Banned kwarg names: algorithm/variant choice must be `method` ──────────
  - id: banned-kwarg-method-family
    languages: [python]
    severity: ERROR
    message: >-
      Public API uses a banned kwarg name for an algorithm/variant choice.
      The canonical name is `method` (CLAUDE.md API table). Banned:
      algorithm / scheme / kind / estimator / icc_type / extract_type /
      perm_type / mode. Rename the public parameter to `method` and translate
      to the internal name at the facade boundary. `metric` (distance/similarity)
      and `spatial_scale` (whole_brain/roi/searchlight) are distinct canonical
      names — use those where they apply, not `method`.
    pattern-either:
      - pattern: "def $F(..., algorithm=$X, ...): ..."
      - pattern: "def $F(..., algorithm: $T = $X, ...): ..."
      - pattern: "def $F(..., algorithm: $T, ...): ..."
      - pattern: "def $F(..., scheme=$X, ...): ..."
      - pattern: "def $F(..., scheme: $T = $X, ...): ..."
      - pattern: "def $F(..., scheme: $T, ...): ..."
      - pattern: "def $F(..., kind=$X, ...): ..."
      - pattern: "def $F(..., kind: $T = $X, ...): ..."
      - pattern: "def $F(..., kind: $T, ...): ..."
      - pattern: "def $F(..., estimator=$X, ...): ..."
      - pattern: "def $F(..., estimator: $T = $X, ...): ..."
      - pattern: "def $F(..., estimator: $T, ...): ..."
      - pattern: "def $F(..., icc_type=$X, ...): ..."
      - pattern: "def $F(..., icc_type: $T = $X, ...): ..."
      - pattern: "def $F(..., icc_type: $T, ...): ..."
      - pattern: "def $F(..., extract_type=$X, ...): ..."
      - pattern: "def $F(..., extract_type: $T = $X, ...): ..."
      - pattern: "def $F(..., extract_type: $T, ...): ..."
      - pattern: "def $F(..., perm_type=$X, ...): ..."
      - pattern: "def $F(..., perm_type: $T = $X, ...): ..."
      - pattern: "def $F(..., perm_type: $T, ...): ..."
      - pattern: "def $F(..., contrast_type=$X, ...): ..."
      - pattern: "def $F(..., contrast_type: $T = $X, ...): ..."
      - pattern: "def $F(..., contrast_type: $T, ...): ..."
      - pattern: "def $F(..., mode=$X, ...): ..."
      - pattern: "def $F(..., mode: $T = $X, ...): ..."
      - pattern: "def $F(..., mode: $T, ...): ..."
    metavariable-regex:
      metavariable: $F
      regex: '^[^_]'
    paths:
      exclude:
        - "**/tests/**"
        - "nltools/algorithms/"
        - "nltools/pipelines/"
        - "scripts/"

  # ── Parallel execution must be `n_jobs: int` ───────────────────────────────
  - id: banned-kwarg-parallel
    languages: [python]
    severity: ERROR
    message: >-
      Public API uses `parallel=` for parallel execution. The canonical name is
      `n_jobs: int = -1` (CLAUDE.md). The stats/algorithm-layer internals may
      keep `parallel=`, but the public facade must expose `n_jobs` and translate.
    pattern-either:
      - pattern: "def $F(..., parallel=$X, ...): ..."
      - pattern: "def $F(..., parallel: $T = $X, ...): ..."
      - pattern: "def $F(..., parallel: $T, ...): ..."
    metavariable-regex:
      metavariable: $F
      regex: '^[^_]'
    paths:
      exclude:
        - "**/tests/**"
        - "nltools/algorithms/"
        - "nltools/pipelines/"
        - "scripts/"

  # ── Permutation count must be `n_permute` (bootstrap: `n_samples`) ──────────
  - id: banned-kwarg-permutation-count
    languages: [python]
    severity: ERROR
    message: >-
      Public API uses a banned permutation/iteration kwarg. Permutation count is
      `n_permute`; bootstrap sample count is `n_samples` (semantically distinct).
      Banned: n_perm / n_iter. (`n_iter` meaning solver iterations in the
      algorithm layer is exempt via the path exclusion.)
    pattern-either:
      - pattern: "def $F(..., n_perm=$X, ...): ..."
      - pattern: "def $F(..., n_perm: $T = $X, ...): ..."
      - pattern: "def $F(..., n_perm: $T, ...): ..."
      - pattern: "def $F(..., n_iter=$X, ...): ..."
      - pattern: "def $F(..., n_iter: $T = $X, ...): ..."
      - pattern: "def $F(..., n_iter: $T, ...): ..."
    metavariable-regex:
      metavariable: $F
      regex: '^[^_]'
    paths:
      exclude:
        - "**/tests/**"
        - "nltools/algorithms/"
        - "nltools/pipelines/"
        - "scripts/"

  # ── Progress indicator must be `progress_bar: bool` ────────────────────────
  - id: banned-kwarg-progress
    languages: [python]
    severity: ERROR
    message: >-
      Public API uses `show_progress=` for a progress indicator. The canonical
      name is `progress_bar: bool = False` (CLAUDE.md). `verbose` is reserved for
      log-level only and must not double as a progress flag.
    pattern-either:
      - pattern: "def $F(..., show_progress=$X, ...): ..."
      - pattern: "def $F(..., show_progress: $T = $X, ...): ..."
      - pattern: "def $F(..., show_progress: $T, ...): ..."
    metavariable-regex:
      metavariable: $F
      regex: '^[^_]'
    paths:
      exclude:
        - "**/tests/**"
        - "nltools/algorithms/"
        - "nltools/pipelines/"
        - "scripts/"

  # ── Diagonal flag must be `include_diag: bool` ─────────────────────────────
  - id: banned-kwarg-diagonal
    languages: [python]
    severity: ERROR
    message: >-
      Public API uses `ignore_diagonal=`. The canonical name is
      `include_diag: bool` (CLAUDE.md) — note the inverted sense.
    pattern-either:
      - pattern: "def $F(..., ignore_diagonal=$X, ...): ..."
      - pattern: "def $F(..., ignore_diagonal: $T = $X, ...): ..."
      - pattern: "def $F(..., ignore_diagonal: $T, ...): ..."
    metavariable-regex:
      metavariable: $F
      regex: '^[^_]'
    paths:
      exclude:
        - "**/tests/**"
        - "nltools/algorithms/"
        - "nltools/pipelines/"
        - "scripts/"

  # ── **kwargs across internal nltools->nltools boundaries ───────────────────
  # Plotting modules are excluded: they overwhelmingly forward **kwargs to
  # matplotlib / seaborn / nilearn (legitimate third-party passthrough), so a
  # blanket flag there is pure noise. The genuine plotting misuses (mining
  # kwargs.get instead of forwarding — F128 plot_silhouette, F035 plot_mds) are
  # tracked as targeted api-consistency findings, not by this rule.
  - id: kwargs-internal-forwarding
    languages: [python]
    severity: WARNING
    message: >-
      `**kwargs` in a public signature. CLAUDE.md permits `**kwargs` ONLY when
      forwarding to a genuine third-party API (sklearn / matplotlib / nilearn /
      nibabel / seaborn / pandas). Internal nltools->nltools delegation must use
      explicit parameters. If this forwards to a third-party API, suppress with
      `# nosemgrep: kwargs-internal-forwarding` and name the API.
    pattern-either:
      - pattern: "def $F(..., **kwargs): ..."
      - pattern: "def $F(..., **kwargs) -> $R: ..."
    metavariable-regex:
      metavariable: $F
      regex: '^[^_]'
    paths:
      exclude:
        - "**/tests/**"
        - "nltools/algorithms/"
        - "nltools/pipelines/"
        - "scripts/"
        # Plotting = legitimate matplotlib/seaborn/nilearn passthrough (see note above)
        - "nltools/plotting/"
        - "**/plotting.py"
        - "**/brain.py"
