name: Weekly Comprehensive Tests

on:
  schedule:
    # Sunday at 11pm UTC (6pm EST, 3pm PST)
    - cron: "0 23 * * 0"
  workflow_dispatch:

jobs:
  test-full:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13']
        include:
          # Add macOS for one Python version to catch platform-specific issues
          - os: macos-latest
            python-version: '3.12'

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.7.6"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra all

      - name: Cache HF niftis dataset
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/huggingface
          key: hf-cache-${{ runner.os }}-${{ hashFiles('nltools/templates/fetch.py') }}
          restore-keys: |
            hf-cache-${{ runner.os }}-

      - name: Lint with ruff
        run: uv run ruff check nltools/

      - name: Run all tests (including slow)
        env:
          HF_HUB_ETAG_TIMEOUT: "30"
        run: uv run pytest -n 2 -m "" --tb=short

      - name: Build docs
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv run jupyter-book build docs

      - name: Build package
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv build
